<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jemmer Almoneda Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Zen+Kaku+Gothic+New:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent:           #ff4d4d;
            --accent-glow:      rgba(255, 77, 77, 0.5);
            --bg-dark:          #0f0c11;
            --bg-gradient:      radial-gradient(circle at top left, #2d0a0a, #0f0c11);
            --glass-bg:         rgba(255, 255, 255, 0.03);
            --blur-val:         25px;
            --text-color:       #e2e8f0;
            --text-dim:         rgba(226, 232, 240, 0.4);
            --border-color:     rgba(255, 255, 255, 0.1);
            --transition-speed: 0.8s;
            --spark-color:      #c8a0ff;
            --star-fill:        #c8a0ff;
            --scan-tint:        rgba(180, 120, 255, 0.10);
            --scene-glow-out:   rgba(140, 60, 255, 0.40);
            --scene-glow-in:    rgba(100, 30, 200, 0.18);
            --curtain-color:    #5c0000;
            /* modal vars */
            --modal-bg:         rgba(12,10,22,0.98);
            --modal-surface:    rgba(255,255,255,0.045);
            --modal-border:     rgba(255,255,255,0.08);
            --modal-border-hi:  rgba(255,77,77,0.45);
            --modal-accent:     #ff4d4d;
            --modal-accent2:    #ff6b6b;
            --modal-glow:       rgba(255,77,77,0.28);
            --modal-fg:         #f8f6ff;
            --modal-muted:      rgba(248,246,255,0.52);
            --modal-dim:        rgba(248,246,255,0.26);
        }

        body.light-mode {
            --accent:           #e83c7a;
            --accent-glow:      rgba(232, 60, 122, 0.30);
            --bg-dark:          #1a0510;
            --bg-gradient:      radial-gradient(ellipse at 30% 0%, #3d0820 0%, #1a0510 45%, #0a0018 100%);
            --glass-bg:         rgba(255, 255, 255, 0.055);
            --blur-val:         20px;
            --text-color:       #f0e8f5;
            --text-dim:         rgba(220, 195, 235, 0.45);
            --border-color:     rgba(232, 60, 122, 0.18);
            --spark-color:      #e83c7a;
            --star-fill:        #00d4ff;
            --scan-tint:        rgba(232, 60, 122, 0.10);
            --scene-glow-out:   rgba(200, 16, 46, 0.45);
            --scene-glow-in:    rgba(232, 60, 122, 0.15);
            --curtain-color:    #8b0000;
            --modal-bg:         rgba(26,5,16,0.99);
            --modal-surface:    rgba(255,255,255,0.055);
            --modal-border:     rgba(232,60,122,0.18);
            --modal-border-hi:  rgba(232,60,122,0.55);
            --modal-accent:     #e83c7a;
            --modal-accent2:    #ff8ab5;
            --modal-glow:       rgba(232,60,122,0.28);
            --modal-fg:         #f0e8f5;
            --modal-muted:      rgba(220,195,235,0.6);
            --modal-dim:        rgba(220,195,235,0.35);
        }

        /* SVG Theme Toggles */
        body.light-mode .theme-dark-only { display: none; }
        body:not(.light-mode) .theme-light-only { display: none; }

        .initial-load-overlay {
            position: fixed; inset: 0;
            z-index: 10000; pointer-events: none;
            display: flex; flex-direction: column;
            overflow: hidden;
            background: var(--bg-gradient);
            transition: opacity 0.8s ease;
            opacity: 1;
        }
        .curtain-left, .curtain-right {
            position: absolute; top: 0; bottom: 0; width: 50%;
            background:
                repeating-linear-gradient(90deg,rgba(0,0,0,0.18) 0px,rgba(0,0,0,0.18) 2px,transparent 2px,transparent 18px),
                linear-gradient(180deg, #6b0000 0%, #8b0000 40%, #5c0000 100%);
            transform-origin: top;
            animation: curtain-rise 2.2s cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
        }
        .curtain-left  { left: 0; border-right: 3px solid rgba(255,180,0,0.35); }
        .curtain-right { right: 0; border-left: 3px solid rgba(255,180,0,0.35); animation-delay: 0.15s; }
        .curtain-left::after, .curtain-right::after {
            content:''; position: absolute; bottom: 0; left: 0; right: 0; height: 22px;
            background: repeating-linear-gradient(90deg,#c8a000 0px,#c8a000 4px,#8b6e00 4px,#8b6e00 10px);
            opacity: 0.7;
        }
        @keyframes curtain-rise { 0%{transform:scaleY(1);} 100%{transform:scaleY(0);} }

.reveal-overlay {
            position: fixed; inset: 0;
            z-index: 9999;
            pointer-events: none;
            display: none;
            overflow: hidden;
            background: var(--bg-gradient);
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-color);
            font-family: 'Outfit', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh; margin: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: flex-start;
            overflow-x: hidden; overflow-y: auto;
            padding: 10px;
            transition: background var(--transition-speed) ease, color var(--transition-speed) ease;
        }

        .glass, .app-icon, .quote-box, .clock-overlay, .highlight, .widget-action, p, span, i {
            transition: background var(--transition-speed) ease, border var(--transition-speed) ease,
                color var(--transition-speed) ease, box-shadow var(--transition-speed) ease,
                backdrop-filter var(--transition-speed) ease, transform 0.3s ease;
        }

        @keyframes fadeInUp { from{opacity:0;transform:translateY(15px) scale(0.99);} to{opacity:1;transform:translateY(0) scale(1);} }
        .animate-in { animation: fadeInUp 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; opacity: 0; }
        .delay-1 { animation-delay: 0.1s; } .delay-2 { animation-delay: 0.2s; }
        .delay-3 { animation-delay: 0.3s; } .delay-4 { animation-delay: 0.4s; }

        .dashboard-container {
            width: 100%; max-width: 860px;
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 8px; position: relative; padding-top: 10px;
        }

        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(var(--blur-val));
            -webkit-backdrop-filter: blur(var(--blur-val));
            border: 1px solid var(--border-color);
            border-radius: 24px; overflow: hidden;
            position: relative;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }
        .glass:hover { border: 1px solid var(--accent); transform: translateY(-3px); z-index: 10; }

        .widget-hero {
            grid-column: 1 / 5; height: 220px;
            display: flex; align-items: center; justify-content: center;
            background-size: cover; background-position: center;
            background-image: linear-gradient(to bottom, rgba(0,0,0,0) 50%, var(--bg-dark)), url('main-hero.jpg');
        }
        body.light-mode .widget-hero {
            background-image: linear-gradient(to bottom, rgba(26,5,16,0) 40%, #1a0510 100%), url('main-hero-day.jpg');
        }
        .clock-overlay {
            font-size: clamp(2.8rem, 8vw, 5rem); font-weight: 100;
            letter-spacing: 8px; color: var(--text-color);
            text-shadow: 0 0 25px var(--accent-glow);
        }

        .widget-scene {
            grid-column: 1 / 3; grid-row: span 2; min-height: 248px;
            background-size: cover; background-position: center;
            background-image: url('main-hero-WIDGETTWO.jpg');
            position: relative; overflow: hidden;
            box-shadow: 0 0 22px 4px var(--scene-glow-out), inset 0 0 30px var(--scene-glow-in);
        }
        body.light-mode .widget-scene { background-image: url('main-hero-day-WIDGETTWO.jpg'); }

        .scene-scanline {
            position: absolute; left: 0; width: 100%; height: 35%;
            pointer-events: none; z-index: 3; top: -40%;
            animation: scene-scan 6s linear infinite;
            background: linear-gradient(180deg, transparent, var(--scan-tint), transparent);
        }
        @keyframes scene-scan { 0%{top:-40%;} 100%{top:120%;} }
        .widget-scene:hover .scene-scanline { animation-duration: 3s; }

        .scene-spark {
            position: absolute; pointer-events: none; z-index: 4; opacity: 0;
            animation: scene-rise var(--sp-dur, 3.5s) ease-in infinite;
            animation-delay: var(--sp-delay, 0s);
        }
        .scene-spark::before {
            content:''; display: block;
            width: var(--sp-size, 6px); height: var(--sp-size, 6px);
            clip-path: polygon(50% 0%,60% 40%,100% 50%,60% 60%,50% 100%,40% 60%,0% 50%,40% 40%);
            background: var(--spark-color);
        }
        @keyframes scene-rise {
            0%{transform:translateY(0) scale(1) rotate(0deg); opacity:0;}
            15%{opacity:1;} 85%{opacity:0.55;}
            100%{transform:translateY(-110px) scale(0.15) rotate(200deg); opacity:0;}
        }
        .widget-scene:hover .scene-spark { animation-duration: calc(var(--sp-dur,3.5s) * 0.55); }

        .scene-star {
            position: absolute; z-index: 5; pointer-events: none;
            display: block; line-height: 0;
            animation: scene-twinkle var(--tw-dur,2s) ease-in-out infinite;
            animation-delay: var(--tw-delay,0s);
        }
        .scene-star svg { fill: var(--star-fill); }
        @keyframes scene-twinkle { 0%,100%{opacity:0.9;transform:scale(1) rotate(0deg);} 50%{opacity:0.1;transform:scale(0.35) rotate(45deg);} }

        .widget-apps {
            grid-column: 3 / 4;
            display: grid; grid-template-columns: repeat(2, 1fr); grid-template-rows: repeat(2, 1fr);
            gap: 8px;
        }
        .widget-image {
            grid-column: 4 / 5;
            min-height: 120px;
            background-size: cover; background-position: center;
            background-image: url('wideget-three.jpg');
        }
        body.light-mode .widget-image {
            background-image: url('widget-three-day.jpg');
            filter: brightness(0.9) saturate(1.1);
        }
        .app-icon {
            aspect-ratio: 1/1; border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.3rem; color: var(--accent);
            background: rgba(255,77,77,0.05); cursor: pointer;
            position: relative; overflow: hidden;
        }
        body.light-mode .app-icon { background: rgba(232,60,122,0.07); }
        .app-icon:hover { background: rgba(255,77,77,0.12); }
        body.light-mode .app-icon:hover { background: rgba(232,60,122,0.15); }
        
        .mini-stats {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-family: 'Outfit', sans-serif;
            line-height: 1;
        }
        .mini-stat-num {
            font-size: 1.1rem; font-weight: 700; color: var(--accent);
        }
        .mini-stat-label {
            font-size: 0.45rem; font-weight: 600; letter-spacing: 0.1em;
            color: var(--accent); opacity: 0.7;
        }

        .search-container { grid-column: 3 / 5; display: flex; gap: 8px; align-items: center; }
        .widget-search {
            flex: 1; display: flex; align-items: center;
            padding: 0 16px; background: var(--glass-bg);
            border-radius: 50px; height: 44px; border: 1px solid var(--border-color);
        }
        .widget-search input {
            background: transparent; border: none; outline: none;
            color: var(--text-color); margin-left: 10px; font-size: 0.85rem; width: 100%;
        }
        .roll-placeholder {
            color: var(--modal-accent); margin-left: 10px; font-size: 0.85rem; cursor: pointer;
            animation: typeRoll 2s steps(12) infinite;
        }
        @keyframes typeRoll {
            0% { color: var(--modal-accent); }
            20% { color: var(--accent); }
            40% { color: var(--modal-accent); }
            60% { color: var(--accent); }
            100% { color: var(--modal-accent); }
        }
        .roll-placeholder:hover { color: var(--accent); }
        .widget-action {
            width: 44px; height: 44px;
            display: flex; align-items: center; justify-content: center;
            background: var(--accent); color: white;
            border-radius: 50%; cursor: pointer;
            box-shadow: 0 0 10px var(--accent-glow);
        }
        
        .roll-btn {
            animation: pulse-roll 2s infinite;
        }
        @keyframes pulse-roll {
            0%, 100% { box-shadow: 0 0 10px var(--accent-glow); }
            50% { box-shadow: 0 0 20px rgba(255,77,77,0.8); }
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .widget-quote-stack { grid-column: 1 / 3; display: flex; flex-direction: column; gap: 8px; }
        .quote-box {
            height: 120px; background-size: cover; background-position: center;
            padding: 18px; display: flex; flex-direction: column;
            justify-content: flex-end; text-decoration: none; color: inherit;
            position: relative; overflow: hidden;
        }
        .quote-box.q1 { background-image: url('git-banner.png'); }
        body.light-mode .quote-box.q1 { background-image: url('git-banner-day.png'); }
        .quote-box.q2 { background-image: url('itch-banner.png'); }
        body.light-mode .quote-box.q2 { background-image: url('itch-banner-day.png'); }

        .quote-box.q2::after {
            content:''; position: absolute; inset: 0;
            background: radial-gradient(circle at center, rgba(232,60,122,0.15) 0%, transparent 70%);
            opacity: 0; transition: opacity 0.5s ease; pointer-events: none; z-index: 2;
        }
        .quote-box.q2:hover::after { opacity: 1; animation: sparkle-flicker 2s infinite alternate; }
        @keyframes sparkle-flicker { 0%{transform:scale(1);opacity:0.4;} 100%{transform:scale(1.1);opacity:0.8;} }

        .quote-box::before {
            content:''; position: absolute; inset: 0; z-index: 1;
            background: linear-gradient(to top, rgba(0,0,0,0.85), transparent);
        }
        body.light-mode .quote-box::before {
            background: linear-gradient(to top, rgba(10,0,24,0.88) 0%, rgba(10,0,24,0.50) 55%, transparent 100%);
        }
        .quote-box div { position: relative; z-index: 6; font-size: 0.8rem; line-height: 1.3; font-weight: 500; }
        .highlight { color: #fff; background: var(--accent); padding: 2px 6px; border-radius: 6px; }

        .widget-profile {
            grid-column: 3 / 5; padding: 18px;
            display: flex; flex-direction: column; justify-content: space-between;
            cursor: pointer; position: relative; overflow: hidden;
            background-size: cover; background-position: center;
            background-image: url('card-bg.jpg');
        }
        body.light-mode .widget-profile { background-image: url('card-bg-day.jpg'); }
        body.light-mode .widget-profile::before {
            content:''; position: absolute; inset: 0;
            background: rgba(255,255,255,0.5);
            pointer-events: none;
        }
        body.light-mode .widget-profile .profile-name { 
            color: #000; font-weight: 800; 
            text-shadow: 0 1px 0 rgba(255,255,255,0.8);
        }
        body.light-mode .widget-profile .profile-handle { 
            color: #000; 
            text-shadow: 0 0 3px rgba(255,255,255,0.9);
        }
        body.light-mode .widget-profile .profile-role { color: #000; font-weight: 700; }
        body.light-mode .widget-profile .profile-action { color: #000; }

        .widget-profile { color: #fff; }
        .widget-profile .profile-name { color: #fff; text-shadow: 0 1px 4px rgba(0,0,0,0.9); }
        .widget-profile .profile-handle, .widget-profile .profile-action { color: #ff8888; }
        .widget-profile .profile-role { color: rgba(255,255,255,0.8); }
        .widget-profile::before {
            content:''; position: absolute; inset: 0;
            background: radial-gradient(circle at 80% 20%, var(--accent-glow) 0%, transparent 50%);
            pointer-events: none;
        }
        body.light-mode .widget-profile::before { background: radial-gradient(circle at 80% 20%, rgba(232,60,122,0.12) 0%, transparent 50%); }
        .widget-profile::after {
            content:''; position: absolute; top: 0; left: 14px; right: 14px; height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            opacity: 0.4;
        }
        .profile-header { display: flex; align-items: center; gap: 12px; position: relative; z-index: 1; }
        .profile-avatar {
            width: 48px; height: 48px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; flex-shrink: 0;
            box-shadow: 0 0 0 3px var(--accent-glow);
        }
        body.light-mode .profile-avatar {
            box-shadow: 0 0 0 3px rgba(232,60,122,0.3), 0 0 20px rgba(232,60,122,0.2);
        }
        .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .profile-name {
            font-family: 'Outfit', sans-serif; font-size: 1.05rem; font-weight: 700;
            letter-spacing: -0.02em; color: var(--text-color); line-height: 1.2;
        }
        .profile-handle {
            display: inline-flex; align-items: center; gap: 5px;
            font-family: 'Zen Kaku Gothic New', sans-serif; font-size: 0.64rem;
            letter-spacing: 0.08em; color: var(--accent); margin-top: 4px;
        }
        .profile-handle::before {
            content:''; width: 5px; height: 5px; border-radius: 50%;
            background: var(--accent); box-shadow: 0 0 6px var(--accent-glow);
            animation: status-pulse 2s ease-in-out infinite;
        }
        @keyframes status-pulse { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:0.6;transform:scale(0.85);} }
        .profile-body { display: flex; justify-content: space-between; align-items: flex-end; margin-top: 8px; position: relative; z-index: 1; }
        .profile-role {
            font-family: 'Zen Kaku Gothic New', sans-serif; font-size: 0.52rem;
            letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-dim);
        }
        .profile-action { font-size: 0.7rem; color: var(--accent); display: flex; align-items: center; gap: 6px; }
        .profile-action i { font-size: 0.6rem; }

        .footer-nav {
            grid-column: 1 / 5;
            display: flex; justify-content: space-between;
            padding: 15px 5px 30px;
            font-size: 0.6rem; color: var(--text-dim);
            letter-spacing: 2px; text-transform: uppercase;
        }

        body.light-mode .dark-icon { display: none; }
        body:not(.light-mode) .light-icon { display: none; }

/* ══ MASTER MODAL SYSTEM ══ */
        .master-modal-backdrop {
            position: fixed; inset: 0; z-index: 9000;
            background: rgba(10, 5, 15, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex; align-items: center; justify-content: center;
            padding: 32px;
            opacity: 0; pointer-events: none;
            transition: opacity 0.25s ease;
        }
        body.light-mode .master-modal-backdrop { background: rgba(26,5,16,0.92); }
        .master-modal-backdrop.open { opacity: 1; pointer-events: all; }

        .master-modal {
            position: relative; 
            width: 100%; 
            max-width: 680px; 
            max-height: 85vh;
            background: var(--modal-bg);
            border-radius: 20px;
            display: flex; flex-direction: column;
            box-shadow: 0 25px 60px rgba(0,0,0,0.8);
            transform: translateY(20px) scale(0.98);
            transition: transform 0.3s cubic-bezier(0.22,1,0.36,1), opacity 0.3s;
            opacity: 0;
            z-index: 20;
        }
        body:not(.light-mode) .master-modal {
            border: 2px solid #e63946;
            box-shadow: 0 0 25px rgba(230, 57, 70, 0.35), 0 25px 60px rgba(0,0,0,0.8);
        }
        body.light-mode .master-modal {
            border: 2px solid #000;
            box-shadow: 0 25px 60px rgba(0,0,0,0.5);
        }
        body.light-mode .master-modal {
            border: 2px solid #000;
            box-shadow: 0 25px 60px rgba(0,0,0,0.5);
        }
        
        .master-modal.modal-right {
            position: fixed;
            right: 0;
            left: auto;
            top: 16px;
            bottom: 16px;
            max-width: 480px;
            width: 90%;
            max-height: calc(100vh - 32px);
            border-radius: 16px;
            background: #0c0a16;
            transform: translateX(100%);
            box-shadow: -10px 0 40px rgba(0,0,0,0.6);
            transition: transform 0.35s ease-out;
        }
        
        .master-modal-backdrop.open .master-modal.modal-right {
            transform: translateX(0);
        }
        
        .master-modal.modal-right .projects-modal-inner {
            background: #0c0a16;
            color: #f8f6ff;
            min-height: 100vh;
        }
        
        .master-modal.modal-right .modal-close-btn {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 100;
            background: rgba(255,77,77,0.2);
            border-color: #ff4d4d;
        }

        /* Hide the ornate SVG when using the side right modal */
        .master-modal.modal-right .modal-ornament { display: none; }
        
        @media (max-width: 600px) {
            .master-modal.modal-right {
                width: 100%;
                max-width: 100%;
            }
        }
        
        .master-modal-backdrop.open .master-modal {
            transform: none;
            opacity: 1;
        }

        .modal-close-btn {
            position: absolute; top: 16px; right: 16px; z-index: 50;
            width: 28px; height: 28px; border-radius: 50%;
            background: rgba(200,30,30,0.12);
            border: 1.5px solid rgba(200,30,30,0.35);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s;
        }
        .modal-close-btn:hover { background: rgba(200,30,30,0.25); border-color: #cc2222; }
        .modal-close-btn svg { 
            width: 10px; height: 10px; 
            fill: none; stroke: #cc2222; 
            stroke-width: 2; stroke-linecap: round; 
        }

        .modal-scrollable { 
            overflow-y: auto; flex: 1; 
            margin: 24px 18px 18px;
            background: var(--modal-bg);
            border-radius: 12px;
            color: var(--modal-fg);
            scrollbar-width: thin; 
            scrollbar-color: var(--accent) transparent;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
            overscroll-behavior: contain;
            position: relative;
            z-index: 30;
        }
        .modal-scrollable::-webkit-scrollbar { width: 4px; }
        .modal-scrollable::-webkit-scrollbar-thumb { 
            background: var(--accent); border-radius: 4px; 
        }
        .modal-scrollable::-webkit-scrollbar-track { background: transparent; }
        
        .modal-scrollable .stats-title,
        .modal-scrollable .projects-title,
        .modal-scrollable .contact-modal-title,
        .modal-scrollable .about-name,
        .modal-scrollable .proj-card-title,

<body>

    <div class="initial-load-overlay" id="start-overlay">
        <div class="curtain-left"></div>
        <div class="curtain-right"></div>
    </div>
    <div class="reveal-overlay" id="reveal-overlay">
        <div class="reveal-curtain reveal-left"></div>
        <div class="reveal-curtain reveal-right"></div>
    </div>

    <!-- ══ MASTER MODAL WITH SPARKLE/SPARXIE HSR SVG THEME BORDERS ══ -->
    <div class="master-modal-backdrop" id="master-modal" onclick="handleModalBackdrop(event)">
        <div class="master-modal" id="master-modal-card">
            
            <!-- ORNAMENTAL SVG FRAME -->
            <svg class="modal-ornament" width="100%" height="100%" style="position:absolute; inset:0; pointer-events:none; z-index:40; overflow:visible;">
                <defs>
                    <filter id="glow-heavy" x="-20%" y="-20%" width="140%" height="140%">
                        <feGaussianBlur stdDeviation="3" result="blur" />
                        <feComposite in="SourceGraphic" in2="blur" operator="over" />
                    </filter>
                    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#ffd700" />
                        <stop offset="100%" stop-color="#ff8c00" />
                    </linearGradient>
                    <linearGradient id="pink-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#ffb6c1" />
                        <stop offset="100%" stop-color="#ff69b4" />
                    </linearGradient>
                </defs>

                <!-- Frame Outline that sits just behind edge -->
                <rect x="0" y="0" width="100%" height="100%" rx="20" fill="none" stroke="var(--modal-accent)" stroke-width="3" filter="url(#glow-heavy)"/>
                <rect x="6" y="6" width="calc(100% - 12px)" height="calc(100% - 12px)" rx="14" fill="none" stroke="var(--modal-accent2)" stroke-width="1.5" stroke-dasharray="8 6" opacity="0.6"/>

                <!-- Left Asymmetrical Deco Pane (Genshin Style) -->
                <svg x="0" y="20%" width="20" height="60%" style="overflow:visible;">
                    <path d="M -16,0 C 12,25 12,calc(100% - 25) -16,100% L 0,100% L 0,0 Z" fill="var(--modal-accent)" opacity="0.9"/>
                    <path d="M -8,15 C 8,35 8,calc(100% - 35) -8,calc(100% - 15)" stroke="var(--modal-bg)" stroke-width="1.5" fill="none"/>
                </svg>
                <svg x="100%" y="20%" width="20" height="60%" style="overflow:visible;">
                    <g transform="scale(-1, 1)">
                        <path d="M -10,0 C 10,25 10,calc(100% - 25) -10,100% L 0,100% L 0,0 Z" fill="var(--modal-accent)" opacity="0.5"/>
                    </g>
                </svg>

                <!-- TOP LEFT CORNER -->
                <svg x="0" y="0" style="overflow:visible;">
                    <!-- Night/Dark Mode: Sparkle Motif (Masks & Diamond Suits) -->
                    <g class="theme-dark-only" transform="translate(-16, -16)">
                        <path d="M 0,55 Q 0,0 55,0 L 80,0 C 35,12 12,35 0,80 Z" fill="var(--modal-accent)"/>
                        <path d="M 8,48 Q 8,8 48,8 L 56,8 C 28,15 15,28 8,56 Z" fill="#0c0a16"/>
                        <!-- Kitsune Mask Face -->
                        <path d="M 18,18 Q 40,-8 60,18 Q 70,45 40,65 Q 10,45 18,18 Z" fill="var(--modal-bg)" stroke="var(--modal-accent)" stroke-width="2.5" filter="url(#glow-heavy)"/>
                        <polygon points="18,18 12,-5 30,5" fill="var(--modal-accent)"/>
                        <polygon points="60,18 66,-5 48,5" fill="var(--modal-accent)"/>
                        <path d="M 26,28 Q 32,23 38,28" stroke="var(--modal-accent2)" stroke-width="2.5" fill="none"/>
                        <path d="M 52,28 Q 46,23 40,28" stroke="var(--modal-accent2)" stroke-width="2.5" fill="none"/>
                        <polygon points="39,12 43,20 39,28 35,20" fill="url(#gold-grad)"/> <!-- Forehead Diamond -->
                    </g>

                    <!-- Day/Light Mode: Sparxie Motif (Blossoms & Flowing Ribbons) -->
                    <g class="theme-light-only" transform="translate(-16, -16)">
                        <path d="M 0,55 Q 0,0 55,0 L 80,0 C 35,12 12,35 0,80 Z" fill="var(--modal-accent)"/>
                        <path d="M 8,48 Q 8,8 48,8 L 56,8 C 28,15 15,28 8,56 Z" fill="#1a0510"/>
                        <!-- Big stylized blossom -->
                        <circle cx="40" cy="30" r="20" fill="var(--modal-bg)" stroke="var(--modal-accent2)" stroke-width="2.5" filter="url(#glow-heavy)"/>
                        <path d="M 40,18 C 50,8 56,18 40,30 C 24,18 30,8 40,18 Z" fill="url(#pink-grad)"/>
                        <path d="M 40,42 C 50,52 56,42 40,30 C 24,42 30,52 40,42 Z" fill="url(#pink-grad)"/>
                        <path d="M 28,30 C 18,40 18,20 28,30 C 18,20 18,40 28,30 Z" fill="url(#pink-grad)" transform="rotate(45 40 30)"/>
                        <path d="M 52,30 C 62,40 62,20 52,30 C 62,20 62,40 52,30 Z" fill="url(#pink-grad)" transform="rotate(45 40 30)"/>
                        <circle cx="40" cy="30" r="4.5" fill="#ffd700"/>
                    </g>
                </svg>

                <!-- TOP RIGHT CORNER -->
                <svg x="100%" y="0" style="overflow:visible;">
                    <g transform="scale(-1, 1) translate(-10, -10)">
                        <path d="M 0,45 Q 0,0 45,0 L 65,0 C 30,12 12,30 0,65 Z" fill="var(--modal-accent)"/>
                        <path d="M 6,38 Q 6,6 38,6 L 45,6 C 22,12 12,22 6,45 Z" fill="var(--modal-bg)"/>
                        <!-- 4-point Star -->
                        <polygon points="25,-8 28,12 48,15 28,18 25,38 22,18 2,15 22,12" fill="var(--star-fill)" filter="url(#glow-heavy)"/>
                        <circle cx="42" cy="32" r="3.5" fill="var(--modal-accent2)"/>
                    </g>
                </svg>

                <!-- BOTTOM LEFT CORNER -->
                <svg x="0" y="100%" style="overflow:visible;">
                    <g transform="scale(1, -1) translate(-10, -10)">
                        <path d="M 0,45 Q 0,0 45,0 L 65,0 C 30,12 12,30 0,65 Z" fill="var(--modal-accent)"/>
                        <path d="M 6,38 Q 6,6 38,6 L 45,6 C 22,12 12,22 6,45 Z" fill="var(--modal-bg)"/>
                        <!-- Accent orbs / goldfish bubbles -->
                        <circle cx="25" cy="18" r="7" fill="var(--star-fill)" filter="url(#glow-heavy)"/>
                        <circle cx="40" cy="10" r="4" fill="var(--modal-accent2)"/>
                        <circle cx="10" cy="40" r="4" fill="var(--modal-accent2)"/>
                    </g>
                </svg>

                <!-- BOTTOM RIGHT CORNER -->
                <svg x="100%" y="100%" style="overflow:visible;">
                    <g transform="scale(-1, -1) translate(-10, -10)">
                        <path d="M 0,45 Q 0,0 45,0 L 65,0 C 30,12 12,30 0,65 Z" fill="var(--modal-accent)"/>
                        <path d="M 6,38 Q 6,6 38,6 L 45,6 C 22,12 12,22 6,45 Z" fill="var(--modal-bg)"/>
                        <g class="theme-dark-only">
                            <!-- Diamond Suit -->
                            <polygon points="25,5 35,20 25,35 15,20" fill="var(--modal-accent2)" filter="url(#glow-heavy)"/>
                        </g>
                        <g class="theme-light-only">
                            <!-- Mini blossom -->
                            <circle cx="25" cy="22" r="12" fill="var(--modal-bg)" stroke="var(--modal-accent2)" stroke-width="2"/>
                            <circle cx="25" cy="22" r="5" fill="url(#pink-grad)"/>
                        </g>
                    </g>
                </svg>

                <!-- TOP HEADER RIBBON (Genshin Style) -->
                <svg x="50%" y="0" style="overflow:visible;">
                    <g transform="translate(-100, -22)">
                        <!-- Crest Base -->
                        <path d="M 0,0 L 200,0 L 185,26 L 15,26 Z" fill="var(--modal-bg)" stroke="var(--modal-accent)" stroke-width="2.5" filter="url(#glow-heavy)"/>
                        <path d="M 12,4 L 188,4 L 175,21 L 25,21 Z" fill="none" stroke="var(--modal-accent2)" stroke-dasharray="5 3"/>
                        
                        <!-- Floating Stars -->
                        <polygon points="-12,12 -9,18 -2,19 -8,24 -6,32 -12,28 -18,32 -16,24 -22,19 -15,18" fill="var(--star-fill)"/>
                        <polygon points="212,12 215,18 222,19 216,24 218,32 212,28 206,32 208,24 202,19 209,18" fill="var(--star-fill)"/>
                        <circle cx="100" cy="13" r="3" fill="var(--modal-accent2)"/>
                    </g>
                </svg>
            </svg>
            <!-- END ORNAMENTAL SVG FRAME -->

            <div class="modal-shine"></div>
            <button class="modal-close-btn" onclick="closeModal()">
                <svg viewBox="0 0 14 14"><path d="M2 2L12 12M12 2L2 12"/></svg>
            </button>
            <div class="modal-scrollable" id="modal-content-area"></div>
        </div>
    </div>

    <div class="dashboard-container">

        <!-- HERO CLOCK -->
        <div class="glass widget-hero animate-in">
            <div class="clock-overlay" id="clock">00:00</div>
        </div>

        <!-- WIDGET-SCENE -->
        <div class="glass widget-scene animate-in delay-1">
            <div class="scene-scanline"></div>
            <div class="scene-spark" style="left:8%;bottom:12%;--sp-size:5px;--sp-dur:3.0s;--sp-delay:0s;"></div>
            <div class="scene-spark" style="left:20%;bottom:30%;--sp-size:4px;--sp-dur:3.8s;--sp-delay:0.5s;"></div>
            <div class="scene-spark" style="left:33%;bottom:8%;--sp-size:6px;--sp-dur:2.8s;--sp-delay:1.0s;"></div>
            <div class="scene-spark" style="left:48%;bottom:40%;--sp-size:4px;--sp-dur:4.2s;--sp-delay:0.3s;"></div>
            <div class="scene-spark" style="left:62%;bottom:18%;--sp-size:5px;--sp-dur:3.4s;--sp-delay:1.6s;"></div>
            <div class="scene-spark" style="left:75%;bottom:50%;--sp-size:3px;--sp-dur:4.6s;--sp-delay:0.8s;"></div>
            <div class="scene-spark" style="left:88%;bottom:25%;--sp-size:5px;--sp-dur:3.1s;--sp-delay:2.1s;"></div>
            <div class="scene-spark" style="left:15%;bottom:60%;--sp-size:3px;--sp-dur:4.0s;--sp-delay:1.3s;"></div>
            <div class="scene-spark" style="left:42%;bottom:70%;--sp-size:4px;--sp-dur:3.6s;--sp-delay:0.7s;"></div>
            <div class="scene-spark" style="left:58%;bottom:78%;--sp-size:3px;--sp-dur:5.0s;--sp-delay:2.5s;"></div>
            <div class="scene-spark" style="left:78%;bottom:68%;--sp-size:4px;--sp-dur:3.3s;--sp-delay:1.9s;"></div>
            <div class="scene-spark" style="left:5%;bottom:80%;--sp-size:3px;--sp-dur:4.8s;--sp-delay:3.0s;"></div>
            <div class="scene-spark" style="left:92%;bottom:55%;--sp-size:4px;--sp-dur:3.7s;--sp-delay:0.2s;"></div>
            <div class="scene-spark" style="left:30%;bottom:85%;--sp-size:3px;--sp-dur:4.4s;--sp-delay:2.8s;"></div>
            <span class="scene-star" style="top:10px;left:12px;--tw-dur:2.3s;--tw-delay:0s;"><svg width="13" height="13" viewBox="0 0 12 12" xmlns="http://www.w3.org/2000/svg"><polygon points="6,0 7.5,4.5 12,6 7.5,7.5 6,12 4.5,7.5 0,6 4.5,4.5"/></svg></span>
            <span class="scene-star" style="top:10px;right:12px;--tw-dur:1.9s;--tw-delay:0.8s;"><svg width="11" height="11" viewBox="0 0 12 12" xmlns="http://www.w3.org/2000/svg"><polygon points="6,0 7.5,4.5 12,6 7.5,7.5 6,12 4.5,7.5 0,6 4.5,4.5"/></svg></span>
            <span class="scene-star" style="bottom:12px;left:12px;--tw-dur:2.7s;--tw-delay:1.4s;"><svg width="9" height="9" viewBox="0 0 12 12" xmlns="http://www.w3.org/2000/svg"><polygon points="6,0 7.5,4.5 12,6 7.5,7.5 6,12 4.5,7.5 0,6 4.5,4.5"/></svg></span>
            <span class="scene-star" style="bottom:12px;right:12px;--tw-dur:2.1s;--tw-delay:0.5s;"><svg width="11" height="11" viewBox="0 0 12 12" xmlns="http://www.w3.org/2000/svg"><polygon points="6,0 7.5,4.5 12,6 7.5,7.5 6,12 4.5,7.5 0,6 4.5,4.5"/></svg></span>
            <span class="scene-star" style="top:50%;left:10px;transform:translateY(-50%);--tw-dur:3.2s;--tw-delay:1.1s;"><svg width="8" height="8" viewBox="0 0 12 12" xmlns="http://www.w3.org/2000/svg"><polygon points="6,0 7.5,4.5 12,6 7.5,7.5 6,12 4.5,7.5 0,6 4.5,4.5"/></svg></span>
            <span class="scene-star" style="top:50%;right:10px;transform:translateY(-50%);--tw-dur:2.5s;--tw-delay:1.9s;"><svg width="8" height="8" viewBox="0 0 12 12" xmlns="http://www.w3.org/2000/svg"><polygon points="6,0 7.5,4.5 12,6 7.5,7.5 6,12 4.5,7.5 0,6 4.5,4.5"/></svg></span>
        </div>

        <!-- APP ICONS — 4 icons -->
        <div class="widget-apps animate-in delay-1">
            <!-- 1: Theme Toggle -->
            <div class="glass app-icon" onclick="playRevealTransition()" title="Toggle Light/Dark Mode">
                <i class="fas fa-sun light-icon"></i>
                <i class="fas fa-moon dark-icon"></i>
            </div>
            <!-- 2: Stats -->
            <div class="glass app-icon" onclick="openStatsModal()" title="Stats">
                <div class="mini-stats">
                    <span class="mini-stat-num" id="header-stat-num">-</span>
                    <span class="mini-stat-label">PROJ</span>
                </div>
            </div>
            <!-- 3: Projects -->
            <div class="glass app-icon" onclick="openProjectsModal()" title="Projects">
                <i class="fas fa-code-branch"></i>
            </div>
            <!-- 4: Contact -->
            <div class="glass app-icon" onclick="openContactModal()" title="Contact">
                <i class="fas fa-satellite-dish"></i>
            </div>
        </div>

        <!-- IMAGE WIDGET -->
        <div class="glass widget-image animate-in delay-2">
        </div>

        <!-- SEARCH -->
        <div class="search-container animate-in delay-2">
            <div class="glass widget-search">
                <i class="fas fa-search text-xs opacity-50"></i>
                <span class="roll-placeholder" onclick="rollDice()">Click to roll...</span>
            </div>
            <div class="widget-action roll-btn" onclick="rollDice()">
                <i class="fas fa-dice"></i>
            </div>
        </div>

        <!-- QUOTE STACK -->
        <div class="widget-quote-stack animate-in delay-3">
            <a href="https://github.com/shiruri" target="_blank" class="glass quote-box q1">
                <div><span class="highlight">Git</span> Hub Repository</div>
            </a>
            <a href="https://shiroi26.itch.io/" target="_blank" class="glass quote-box q2">
                <div><br><span class="highlight">Shiroi26 - itch.io</span></div>
            </a>
        </div>

        <!-- PROFILE -->
        <div class="glass widget-profile animate-in delay-3" onclick="openAboutModal()">
            <div class="profile-header">
                <div class="profile-avatar">
                    <img src="logo.png" alt="Logo">
                </div>
                <div class="profile-info">
                    <div class="profile-name">Jemmer Almoneda</div>
                    <div class="profile-handle">@Shiro</div>
                </div>
            </div>
            <div class="profile-body">
                <div class="profile-role">Java Dev · Game Dev</div>
                <div class="profile-action">
                    <span>Portfolio</span>
                    <i class="fas fa-arrow-right"></i>
                </div>
            </div>
        </div>

        <!-- FOOTER -->
        <footer class="footer-nav animate-in delay-4">
            <span>Terminal: Astral</span>
            <span>OS 2.1.0</span>
            <div class="flex gap-4 items-center">
                <i class="fas fa-wifi"></i>
                <i class="fas fa-battery-three-quarters"></i>
                <span>@Shiroi26</span>
            </div>
        </footer>

    </div>

    <!-- ══ MODAL CONTENT TEMPLATES ══ -->

    <!-- ABOUT TEMPLATE -->
    <template id="tpl-about">
        <div class="about-modal-inner">
            <div class="about-header">
                <div class="about-avatar">
                    <img src="Documents/icon.jpg" alt="Jemmer Almoneda" onerror="this.style.display='none';this.parentElement.innerHTML='JA'">
                </div>
                <div class="about-header-text">
                    <p class="about-pre">Traveler's Dossier</p>
                    <h2 class="about-name">Jemmer Almoneda</h2>
                    <p class="about-role">Java Developer · Game Dev · Web</p>
                    <div class="about-status">
                        <span class="status-dot"></span>
                        <span class="status-text">Open to opportunities</span>
                    </div>
                </div>
            </div>
            <div class="about-panel-grid">
                <div class="about-panel">
                    <p class="panel-label">Education</p>
                    <div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:rgba(255,77,77,0.08);border:1px solid rgba(255,77,77,0.2);border-radius:10px;">
                        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="var(--modal-accent2)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M7 1l6 3-6 3-6-3 6-3z"/><path d="M1 7l6 3 6-3"/><path d="M1 10l6 3 6-3"/></svg>
                        <span style="font-size:0.76rem;font-weight:500;color:var(--modal-accent2);">ACLC College Manila</span>
                    </div>
                    <div style="margin-top:12px;">
                        <p class="panel-label" style="margin-bottom:8px;">Status</p>
                        <div style="display:flex;flex-wrap:wrap;gap:6px;">
                            <span style="padding:4px 10px;background:rgba(52,211,153,0.1);border:1px solid rgba(52,211,153,0.3);border-radius:100px;font-size:0.62rem;font-weight:600;color:#6ee7b7;">Active</span>
                            <span style="padding:4px 10px;background:rgba(255,77,77,0.1);border:1px solid rgba(255,77,77,0.25);border-radius:100px;font-size:0.62rem;font-weight:600;color:var(--modal-accent2);">@shiros</span>
                        </div>
                    </div>
                </div>
                <div class="about-panel">
                    <p class="panel-label">Technologies</p>
                    <div class="tech-list">
                        <div class="tech-item"><span class="tech-ico">☕</span>Java — Core, OOP, Swing<span class="tech-badge">Primary</span></div>
                        <div class="tech-item"><span class="tech-ico">🗄️</span>MySQL &amp; Oracle<span class="tech-badge">Database</span></div>
                        <div class="tech-item">
                            <span class="tech-ico">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="#6db33f"><path d="M20.59 12.14L13.59 5.14C13.2 4.75 12.69 4.5 12.14 4.5H5.5C4.12 4.5 3 5.62 3 7v13c0 1.38 1.12 2.5 2.5 2.5h13c1.38 0 2.5-1.12 2.5-2.5v-6.64c0-.55-.22-1.06-.59-1.43zM12 14.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
                            </span>Spring Boot<span class="tech-badge">Backend</span>
                        </div>
                        <div class="tech-item"><span class="tech-ico">🎮</span>Ren'Py Engine<span class="tech-badge">Games</span></div>
                        <div class="tech-item"><span class="tech-ico">🌐</span>HTML · CSS · JS<span class="tech-badge">Web</span></div>
                    </div>
                </div>
                <div class="about-panel full">
                    <p class="panel-label">About Me</p>
                    <p class="about-body-text">Student at <strong>ACLC College Manila</strong>, primarily focused on <strong>Java development</strong> with deep knowledge in Swing, OOP, Spring Boot, and databases such as <strong>Oracle and MySQL</strong>. Beyond back-end systems, I create visual novels and web experiences — blending technical precision with a passion for <strong>interactive storytelling</strong>.</p>
                </div>
                <div class="about-panel full">
                    <p class="panel-label">Links</p>
                    <div class="about-links">
                        <a class="about-link-chip" href="https://github.com/shiruri" target="_blank">
                            <svg viewBox="0 0 16 16"><path fill-rule="evenodd" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
                            GitHub

<script>
    const revealOverlay = document.getElementById('reveal-overlay');
    const startOverlay  = document.getElementById('start-overlay');
    const masterModal    = document.getElementById('master-modal');
    const contentArea   = document.getElementById('modal-content-area');

    window.addEventListener('load', () => {
        setTimeout(() => { 
            startOverlay.style.opacity = '0';
            setTimeout(() => { startOverlay.style.display = 'none'; }, 800);
        }, 1200);
        
        // Set initial project count from template
        updateStatsCounts();
    });

function playRevealTransition() {
        const overlay = revealOverlay;
        
        overlay.style.cssText = `
            display: block;
            position: fixed;
            inset: 0;
            z-index: 9999;
            pointer-events: none;
            background: linear-gradient(135deg, #0a0510, #1a0a18, #0a0510);
            opacity: 0;
            transition: opacity 1.2s ease;
        `;
        
        // Fade in
        requestAnimationFrame(() => {
            overlay.style.opacity = '1';
        });
        
        // Toggle and fade out
        setTimeout(() => {
            overlay.style.opacity = '0';
        }, 700);
        
        setTimeout(() => {
            document.body.classList.toggle('light-mode');
        }, 1000);
        
        setTimeout(() => {
            overlay.style.display = 'none';
        }, 1500);
    }

    function openModal(templateId) {
        masterModal.classList.remove('modal-right');
        const template = document.getElementById(templateId);
        if (!template) {
            contentArea.innerHTML = '<p style="padding:20px;color:#ff4d4d;">Not found: ' + templateId + '</p>';
        } else {
            const clone = template.content.cloneNode(true);
            contentArea.innerHTML = '';
            contentArea.appendChild(clone);
        }
        masterModal.classList.add('open');
        document.body.style.overflow = 'hidden';
    }

function openProjectsModal() { 
            openModal('tpl-projects'); 
            setTimeout(() => masterModal.classList.add('modal-right'), 10);
            setTimeout(() => {
                const projCards = document.querySelectorAll('#proj-grid .proj-card[data-cat]');
                document.getElementById('header-stat-num').textContent = projCards.length;
            }, 100);
        }

    function closeModal() {
        masterModal.classList.remove('open', 'modal-right');
        document.body.style.overflow = '';
    }

    function handleModalBackdrop(e) {
        if (e.target === masterModal) closeModal();
    }

    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    function openAboutModal()    { openModal('tpl-about'); }
    function openContactModal()  { openModal('tpl-contact'); }
    function openStatsModal()     { 
            openModal('tpl-stats'); 
            setTimeout(() => masterModal.classList.add('modal-right'), 10);
            setTimeout(updateStatsCounts, 100);
        }
    
    function filterProjects(cat, btn) {
        const cards = document.querySelectorAll('.proj-card');
        document.querySelectorAll('.proj-filter-pill').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        cards.forEach(card => {
            if (cat === 'all' || card.dataset.cat === cat) {
                card.style.display = 'block';
            } else {
                card.style.display = 'none';
            }
        });
    }
    
    function updateStatsCounts() {
        // Get projects from template or modal
        let allCards, webCards, javaCards, gameCards;
        
        const projGridInModal = document.querySelector('#proj-grid');
        if (projGridInModal) {
            allCards = projGridInModal.querySelectorAll('.proj-card[data-cat]');
            webCards = projGridInModal.querySelectorAll('.proj-card[data-cat="web"]');
            javaCards = projGridInModal.querySelectorAll('.proj-card[data-cat="java"]');
            gameCards = projGridInModal.querySelectorAll('.proj-card[data-cat="game"]');
        } else {
            // Count from template
            const tpl = document.getElementById('tpl-projects');
            if (tpl) {
                const content = tpl.content;
                allCards = content.querySelectorAll('.proj-card[data-cat]');
                webCards = content.querySelectorAll('.proj-card[data-cat="web"]');
                javaCards = content.querySelectorAll('.proj-card[data-cat="java"]');
                gameCards = content.querySelectorAll('.proj-card[data-cat="game"]');
            }
        }
        
        if (!allCards) return;
        
        const headerEl = document.getElementById('header-stat-num');
        const totalEl = document.querySelector('.stats-total');
        const webEl = document.querySelector('.stats-web');
        const javaEl = document.querySelector('.stats-java');
        const gameEl = document.querySelector('.stats-game');
        
        if (headerEl) headerEl.textContent = allCards.length;
        if (totalEl) totalEl.textContent = allCards.length;
        if (webEl) webEl.textContent = webCards.length;
        if (javaEl) javaEl.textContent = javaCards.length;
        if (gameEl) gameEl.textContent = gameCards.length;
    }
    
    function rollDice() {
        const cards = document.querySelectorAll('.proj-card[data-cat]');
        if (cards.length === 0) {
            openProjectsModal();
            setTimeout(() => {
                rollDiceInner();
            }, 300);
            return;
        }
        rollDiceInner();
    }
    
    function rollDiceInner() {
        const cards = document.querySelectorAll('.proj-card[data-cat]');
        const diceBtn = document.querySelector('.roll-btn');
        diceBtn.style.animation = 'spin 0.3s linear infinite';
        
        let spins = 0;
        const maxSpins = 12;
        const interval = setInterval(() => {
            cards.forEach(c => c.style.opacity = '0.2');
            const rand = cards[Math.floor(Math.random() * cards.length)];
            rand.style.opacity = '1';
            spins++;
            
            if (spins >= maxSpins) {
                clearInterval(interval);
                const winner = cards[Math.floor(Math.random() * cards.length)];
                cards.forEach(c => { c.style.display = 'none'; c.style.opacity = '1'; });
                winner.style.display = 'block';
                winner.scrollIntoView({ behavior: 'smooth', block: 'center' });
                diceBtn.style.animation = 'pulse-roll 2s infinite';
            }
        }, 100);
    }
    
    function updateClock() {
        const now = new Date();
        const phTime = new Date(now.toLocaleString('en-US', { timeZone: 'Asia/Manila' }));
        let hour = phTime.getHours();
        const min = String(phTime.getMinutes()).padStart(2, '0');
        const ampm = hour >= 12 ? 'PM' : 'AM';
        hour = hour % 12;
        hour = hour ? hour : 12;
        const clock = document.getElementById('clock');
        if (clock) clock.textContent = hour + ':' + min + ' ' + ampm;
    }
    setInterval(updateClock, 1000);
    updateClock();

    // Project Detail Panel
    function openProjectDetail(card) {
        const title = card.querySelector('.proj-card-title').textContent;
        const desc = card.querySelector('.proj-card-desc').textContent;
        const badge = card.querySelector('.proj-card-badge').textContent;
        const img = card.querySelector('.proj-card-thumb img');
        const imgSrc = img ? img.src : '';
        const link = card.querySelector('.proj-card-link');

        const panel = document.getElementById('project-detail-panel');
        const overlay = document.getElementById('project-detail-overlay');

        panel.querySelector('.project-detail-thumb').src = imgSrc || 'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22480%22 height=%22220%22><rect fill=%22%23161025%22 width=%22480%22 height=%22220%22/><text x=%22250%22 y=%22110%22 fill=%22%236366f4%22 font-size=%2216%22 text-anchor=%22middle%22 dy=%22.3em%22>No Image</text></svg>';
        panel.querySelector('.project-detail-badge').textContent = badge;
        panel.querySelector('.project-detail-title').textContent = title;
        panel.querySelector('.project-detail-desc').textContent = desc;

        const linkEl = panel.querySelector('.project-detail-link');
        if (link) {
            linkEl.href = link.href;
            linkEl.style.display = 'inline-flex';
        } else {
            linkEl.style.display = 'none';
        }

        overlay.classList.add('open');
        panel.classList.add('open');
    }

    function closeProjectDetail() {
        document.getElementById('project-detail-panel').classList.remove('open');
        document.getElementById('project-detail-overlay').classList.remove('open');
    }
</script>
