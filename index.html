<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jemmer Almoneda Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Zen+Kaku+Gothic+New:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent:           #ff4d4d;
            --accent-glow:      rgba(255, 77, 77, 0.5);
            --bg-dark:          #0f0c11;
            --bg-gradient:      radial-gradient(circle at top left, #2d0a0a, #0f0c11);
            --glass-bg:         rgba(255, 255, 255, 0.03);
            --blur-val:         25px;
            --text-color:       #e2e8f0;
            --text-dim:         rgba(226, 232, 240, 0.4);
            --border-color:     rgba(255, 255, 255, 0.1);
            --transition-speed: 0.8s;
            --spark-color:      #c8a0ff;
            --star-fill:        #c8a0ff;
            --scan-tint:        rgba(180, 120, 255, 0.10);
            --scene-glow-out:   rgba(140, 60, 255, 0.40);
            --scene-glow-in:    rgba(100, 30, 200, 0.18);
            --curtain-color:    #5c0000;
            --modal-bg:         rgba(12,10,22,0.98);
            --modal-surface:    rgba(255,255,255,0.045);
            --modal-border:     rgba(255,255,255,0.08);
            --modal-border-hi:  rgba(255,77,77,0.45);
            --modal-accent:     #ff4d4d;
            --modal-accent2:    #ff6b6b;
            --modal-glow:       rgba(255,77,77,0.28);
            --modal-fg:         #f8f6ff;
            --modal-muted:      rgba(248,246,255,0.52);
            --modal-dim:        rgba(248,246,255,0.26);
        }

        body.light-mode {
            --accent:           #e83c7a;
            --accent-glow:      rgba(232, 60, 122, 0.30);
            --bg-dark:          #1a0510;
            --bg-gradient:      radial-gradient(ellipse at 30% 0%, #3d0820 0%, #1a0510 45%, #0a0018 100%);
            --glass-bg:         rgba(255, 255, 255, 0.055);
            --blur-val:         20px;
            --text-color:       #f0e8f5;
            --text-dim:         rgba(220, 195, 235, 0.45);
            --border-color:     rgba(232, 60, 122, 0.18);
            --spark-color:      #e83c7a;
            --star-fill:        #00d4ff;
            --scan-tint:        rgba(232, 60, 122, 0.10);
            --scene-glow-out:   rgba(200, 16, 46, 0.45);
            --scene-glow-in:    rgba(232, 60, 122, 0.15);
            --curtain-color:    #8b0000;
            --modal-bg:         rgba(26,5,16,0.99);
            --modal-surface:    rgba(255,255,255,0.055);
            --modal-border:     rgba(232,60,122,0.18);
            --modal-border-hi:  rgba(232,60,122,0.55);
            --modal-accent:     #e83c7a;
            --modal-accent2:    #ff8ab5;
            --modal-glow:       rgba(232,60,122,0.28);
            --modal-fg:         #f0e8f5;
            --modal-muted:      rgba(220,195,235,0.6);
            --modal-dim:        rgba(220,195,235,0.35);
        }

        body.light-mode .theme-dark-only { display: none; }
        body:not(.light-mode) .theme-light-only { display: none; }

        /* ── THEME TRANSITION OVERLAY ── */
        #theme-overlay {
            position: fixed; inset: 0; z-index: 10001;
            pointer-events: none;
            opacity: 0;
            background: var(--bg-gradient);
            transition: opacity 0.55s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #theme-overlay.fade-in  { opacity: 1; }
        #theme-overlay.fade-out { opacity: 0; }

        /* ── CURTAIN INTRO ── */
        .initial-load-overlay {
            position: fixed; inset: 0; z-index: 10000; pointer-events: none;
            display: flex; flex-direction: column; overflow: hidden;
            background: var(--bg-gradient);
            transition: opacity 0.8s ease; opacity: 1;
        }
        .curtain-left, .curtain-right {
            position: absolute; top: 0; bottom: 0; width: 50%;
            background:
                repeating-linear-gradient(90deg,rgba(0,0,0,0.18) 0px,rgba(0,0,0,0.18) 2px,transparent 2px,transparent 18px),
                linear-gradient(180deg, #6b0000 0%, #8b0000 40%, #5c0000 100%);
            transform-origin: top;
            animation: curtain-rise 2.2s cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
        }
        .curtain-left  { left: 0; border-right: 3px solid rgba(255,180,0,0.35); }
        .curtain-right { right: 0; border-left: 3px solid rgba(255,180,0,0.35); animation-delay: 0.15s; }
        .curtain-left::after, .curtain-right::after {
            content:''; position: absolute; bottom: 0; left: 0; right: 0; height: 22px;
            background: repeating-linear-gradient(90deg,#c8a000 0px,#c8a000 4px,#8b6e00 4px,#8b6e00 10px);
            opacity: 0.7;
        }
        @keyframes curtain-rise { 0%{transform:scaleY(1);} 100%{transform:scaleY(0);} }

        body {
            background: var(--bg-gradient);
            color: var(--text-color);
            font-family: 'Outfit', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh; margin: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: flex-start;
            overflow-x: hidden; overflow-y: auto;
            padding: 10px;
            transition: background var(--transition-speed) ease, color var(--transition-speed) ease;
        }

        .glass, .app-icon, .quote-box, .clock-overlay, .highlight, .widget-action, p, span, i {
            transition: background var(--transition-speed) ease, border var(--transition-speed) ease,
                color var(--transition-speed) ease, box-shadow var(--transition-speed) ease,
                backdrop-filter var(--transition-speed) ease, transform 0.3s ease;
        }

        @keyframes fadeInUp { from{opacity:0;transform:translateY(15px) scale(0.99);} to{opacity:1;transform:translateY(0) scale(1);} }
        .animate-in { animation: fadeInUp 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; opacity: 0; }
        .delay-1 { animation-delay: 0.1s; } .delay-2 { animation-delay: 0.2s; }
        .delay-3 { animation-delay: 0.3s; } .delay-4 { animation-delay: 0.4s; }

        .dashboard-container {
            width: 100%; max-width: 860px;
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 8px; position: relative; padding-top: 10px;
        }

        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(var(--blur-val));
            -webkit-backdrop-filter: blur(var(--blur-val));
            border: 1px solid var(--border-color);
            border-radius: 24px; overflow: hidden;
            position: relative;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }
        .glass:hover { border: 1px solid var(--accent); transform: translateY(-3px); z-index: 10; }

        /* ── HERO ── */
        .widget-hero {
            grid-column: 1 / 5; height: 220px;
            display: flex; align-items: center; justify-content: center;
            background-size: cover; background-position: center;
            background-image: linear-gradient(to bottom, rgba(0,0,0,0) 50%, var(--bg-dark)), url('main-hero.jpg');
        }
        body.light-mode .widget-hero {
            background-image: linear-gradient(to bottom, rgba(26,5,16,0) 40%, #1a0510 100%), url('main-hero-day.jpg');
        }
        .clock-overlay {
            font-size: clamp(2.8rem, 8vw, 5rem); font-weight: 100;
            letter-spacing: 8px; color: var(--text-color);
            text-shadow: 0 0 25px var(--accent-glow);
        }

        /* ── SCENE ── */
        .widget-scene {
            grid-column: 1 / 3; grid-row: span 2; min-height: 248px;
            background-size: cover; background-position: center;
            background-image: url('main-hero-WIDGETTWO.jpg');
            position: relative; overflow: hidden;
            box-shadow: 0 0 22px 4px var(--scene-glow-out), inset 0 0 30px var(--scene-glow-in);
        }
        body.light-mode .widget-scene { background-image: url('main-hero-day-WIDGETTWO.jpg'); }

        .scene-scanline {
            position: absolute; left: 0; width: 100%; height: 35%;
            pointer-events: none; z-index: 3; top: -40%;
            animation: scene-scan 6s linear infinite;
            background: linear-gradient(180deg, transparent, var(--scan-tint), transparent);
        }
        @keyframes scene-scan { 0%{top:-40%;} 100%{top:120%;} }
        .widget-scene:hover .scene-scanline { animation-duration: 3s; }

        .scene-spark {
            position: absolute; pointer-events: none; z-index: 4; opacity: 0;
            animation: scene-rise var(--sp-dur, 3.5s) ease-in infinite;
            animation-delay: var(--sp-delay, 0s);
        }
        .scene-spark::before {
            content:''; display: block;
            width: var(--sp-size, 6px); height: var(--sp-size, 6px);
            clip-path: polygon(50% 0%,60% 40%,100% 50%,60% 60%,50% 100%,40% 60%,0% 50%,40% 40%);
            background: var(--spark-color);
        }
        @keyframes scene-rise {
            0%{transform:translateY(0) scale(1) rotate(0deg); opacity:0;}
            15%{opacity:1;} 85%{opacity:0.55;}
            100%{transform:translateY(-110px) scale(0.15) rotate(200deg); opacity:0;}
        }
        .widget-scene:hover .scene-spark { animation-duration: calc(var(--sp-dur,3.5s) * 0.55); }

        .scene-star {
            position: absolute; z-index: 5; pointer-events: none;
            display: block; line-height: 0;
            animation: scene-twinkle var(--tw-dur,2s) ease-in-out infinite;
            animation-delay: var(--tw-delay,0s);
        }
        .scene-star svg { fill: var(--star-fill); }
        @keyframes scene-twinkle { 0%,100%{opacity:0.9;transform:scale(1) rotate(0deg);} 50%{opacity:0.1;transform:scale(0.35) rotate(45deg);} }

        /* ── APP ICONS ── */
        .widget-apps {
            grid-column: 3 / 4;
            display: grid; grid-template-columns: repeat(2, 1fr); grid-template-rows: repeat(2, 1fr);
            gap: 8px;
        }
        .widget-image {
            grid-column: 4 / 5; min-height: 120px;
            background-size: cover; background-position: center;
            background-image: url('wideget-three.jpg');
        }
        body.light-mode .widget-image {
            background-image: url('widget-three-day.jpg');
            filter: brightness(0.9) saturate(1.1);
        }
        .app-icon {
            aspect-ratio: 1/1; border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.3rem; color: var(--accent);
            background: rgba(255,77,77,0.05); cursor: pointer;
            position: relative; overflow: hidden;
        }
        body.light-mode .app-icon { background: rgba(232,60,122,0.07); }
        .app-icon:hover { background: rgba(255,77,77,0.12); }
        body.light-mode .app-icon:hover { background: rgba(232,60,122,0.15); }

        .mini-stats {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-family: 'Outfit', sans-serif; line-height: 1;
        }
        .mini-stat-num { font-size: 1.1rem; font-weight: 700; color: var(--accent); }
        .mini-stat-label { font-size: 0.45rem; font-weight: 600; letter-spacing: 0.1em; color: var(--accent); opacity: 0.7; }

        /* ── STATUS BAR (replaces search/roll) ── */
        .widget-status {
            grid-column: 3 / 5;
            display: flex; align-items: center; gap: 10px;
            padding: 0 18px;
            background: var(--glass-bg);
            backdrop-filter: blur(var(--blur-val));
            -webkit-backdrop-filter: blur(var(--blur-val));
            border: 1px solid var(--border-color);
            border-radius: 50px;
            height: 44px;
            cursor: default;
        }
        .widget-status:hover { border: 1px solid var(--accent); transform: translateY(-2px); }
        .status-pill-dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: #34d399; box-shadow: 0 0 6px rgba(52,211,153,0.7);
            flex-shrink: 0;
            animation: status-pulse 2s ease-in-out infinite;
        }
        @keyframes status-pulse { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:0.5;transform:scale(0.8);} }
        .status-pill-text {
            font-size: 0.75rem; color: var(--text-dim); flex: 1;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .status-pill-tag {
            font-size: 0.6rem; font-weight: 700; letter-spacing: 0.1em;
            padding: 3px 9px; border-radius: 100px;
            background: rgba(255,77,77,0.12); border: 1px solid rgba(255,77,77,0.28);
            color: var(--accent); white-space: nowrap;
        }

        /* ── QUOTE STACK ── */
        .widget-quote-stack { grid-column: 1 / 3; display: flex; flex-direction: column; gap: 8px; }
        .quote-box {
            height: 120px; background-size: cover; background-position: center;
            padding: 18px; display: flex; flex-direction: column;
            justify-content: flex-end; text-decoration: none; color: inherit;
            position: relative; overflow: hidden;
        }
        .quote-box.q1 { background-image: url('git-banner.png'); }
        body.light-mode .quote-box.q1 { background-image: url('git-banner-day.png'); }
        .quote-box.q2 { background-image: url('itch-banner.png'); }
        body.light-mode .quote-box.q2 { background-image: url('itch-banner-day.png'); }

        .quote-box.q2::after {
            content:''; position: absolute; inset: 0;
            background: radial-gradient(circle at center, rgba(232,60,122,0.15) 0%, transparent 70%);
            opacity: 0; transition: opacity 0.5s ease; pointer-events: none; z-index: 2;
        }
        .quote-box.q2:hover::after { opacity: 1; animation: sparkle-flicker 2s infinite alternate; }
        @keyframes sparkle-flicker { 0%{transform:scale(1);opacity:0.4;} 100%{transform:scale(1.1);opacity:0.8;} }

        .quote-box::before {
            content:''; position: absolute; inset: 0; z-index: 1;
            background: linear-gradient(to top, rgba(0,0,0,0.85), transparent);
        }
        body.light-mode .quote-box::before {
            background: linear-gradient(to top, rgba(10,0,24,0.88) 0%, rgba(10,0,24,0.50) 55%, transparent 100%);
        }
        .quote-box div { position: relative; z-index: 6; font-size: 0.8rem; line-height: 1.3; font-weight: 500; }
        .highlight { color: #fff; background: var(--accent); padding: 2px 6px; border-radius: 6px; }

        /* ── PROFILE ── */
        .widget-profile {
            grid-column: 3 / 5; padding: 18px;
            display: flex; flex-direction: column; justify-content: space-between;
            cursor: pointer; position: relative; overflow: hidden;
            background-size: cover; background-position: center;
            background-image: url('card-bg.jpg');
        }
        body.light-mode .widget-profile { background-image: url('card-bg-day.jpg'); }
        body.light-mode .widget-profile::before {
            content:''; position: absolute; inset: 0;
            background: rgba(255,255,255,0.5); pointer-events: none;
        }
        body.light-mode .widget-profile .profile-name  { color: #000; font-weight: 800; text-shadow: 0 1px 0 rgba(255,255,255,0.8); }
        body.light-mode .widget-profile .profile-handle { color: #000; text-shadow: 0 0 3px rgba(255,255,255,0.9); }
        body.light-mode .widget-profile .profile-role   { color: #000; font-weight: 700; }
        body.light-mode .widget-profile .profile-action { color: #000; }

        .widget-profile { color: #fff; }
        .widget-profile .profile-name { color: #fff; text-shadow: 0 1px 4px rgba(0,0,0,0.9); }
        .widget-profile .profile-handle, .widget-profile .profile-action { color: #ff8888; }
        .widget-profile .profile-role { color: rgba(255,255,255,0.8); }
        .widget-profile::before {
            content:''; position: absolute; inset: 0;
            background: radial-gradient(circle at 80% 20%, var(--accent-glow) 0%, transparent 50%);
            pointer-events: none;
        }
        body.light-mode .widget-profile::before { background: radial-gradient(circle at 80% 20%, rgba(232,60,122,0.12) 0%, transparent 50%); }
        .widget-profile::after {
            content:''; position: absolute; top: 0; left: 14px; right: 14px; height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent); opacity: 0.4;
        }
        .profile-header { display: flex; align-items: center; gap: 12px; position: relative; z-index: 1; }
        .profile-avatar {
            width: 48px; height: 48px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; flex-shrink: 0;
            box-shadow: 0 0 0 3px var(--accent-glow);
        }
        body.light-mode .profile-avatar { box-shadow: 0 0 0 3px rgba(232,60,122,0.3), 0 0 20px rgba(232,60,122,0.2); }
        .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .profile-name { font-family: 'Outfit', sans-serif; font-size: 1.05rem; font-weight: 700; letter-spacing: -0.02em; color: var(--text-color); line-height: 1.2; }
        .profile-handle {
            display: inline-flex; align-items: center; gap: 5px;
            font-family: 'Zen Kaku Gothic New', sans-serif; font-size: 0.64rem;
            letter-spacing: 0.08em; color: var(--accent); margin-top: 4px;
        }
        .profile-handle::before {
            content:''; width: 5px; height: 5px; border-radius: 50%;
            background: var(--accent); box-shadow: 0 0 6px var(--accent-glow);
            animation: status-pulse 2s ease-in-out infinite;
        }
        .profile-body { display: flex; justify-content: space-between; align-items: flex-end; margin-top: 8px; position: relative; z-index: 1; }
        .profile-role { font-family: 'Zen Kaku Gothic New', sans-serif; font-size: 0.52rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-dim); }
        .profile-action { font-size: 0.7rem; color: var(--accent); display: flex; align-items: center; gap: 6px; }
        .profile-action i { font-size: 0.6rem; }

        /* ── FOOTER ── */
        .footer-nav {
            grid-column: 1 / 5;
            display: flex; justify-content: space-between;
            padding: 15px 5px 30px;
            font-size: 0.6rem; color: var(--text-dim);
            letter-spacing: 2px; text-transform: uppercase;
        }

        body.light-mode .dark-icon { display: none; }
        body:not(.light-mode) .light-icon { display: none; }

        /* ══════════════════════════════════
           MASTER MODAL SYSTEM
        ══════════════════════════════════ */
        .master-modal-backdrop {
            position: fixed; inset: 0; z-index: 9000;
            background: rgba(10, 5, 15, 0.75);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            display: flex; align-items: center; justify-content: center;
            padding: 32px;
            opacity: 0; pointer-events: none;
            transition: opacity 0.25s ease;
        }
        body.light-mode .master-modal-backdrop { background: rgba(26,5,16,0.92); }
        .master-modal-backdrop.open { opacity: 1; pointer-events: all; }

        .master-modal {
            position: relative; width: 100%; max-width: 680px; max-height: 85vh;
            background: var(--modal-bg); border-radius: 20px;
            display: flex; flex-direction: column;
            box-shadow: 0 25px 60px rgba(0,0,0,0.8);
            transform: translateY(20px) scale(0.98);
            transition: transform 0.3s cubic-bezier(0.22,1,0.36,1), opacity 0.3s;
            opacity: 0; z-index: 20;
        }
        body:not(.light-mode) .master-modal {
            border: 2px solid #e63946;
            box-shadow: 0 0 25px rgba(230, 57, 70, 0.35), 0 25px 60px rgba(0,0,0,0.8);
        }
        body.light-mode .master-modal { border: 2px solid #000; box-shadow: 0 25px 60px rgba(0,0,0,0.5); }

        .master-modal.modal-right {
            position: fixed; right: 0; left: auto;
            top: 16px; bottom: 16px;
            max-width: 480px; width: 90%;
            max-height: calc(100vh - 32px);
            border-radius: 16px;
            background: #0c0a16;
            transform: translateX(100%);
            box-shadow: -10px 0 40px rgba(0,0,0,0.6);
            transition: transform 0.35s ease-out;
        }
        .master-modal-backdrop.open .master-modal.modal-right { transform: translateX(0); }
        .master-modal.modal-right .modal-close-btn { position: fixed; top: 16px; right: 16px; z-index: 100; background: rgba(255,77,77,0.2); border-color: #ff4d4d; }
        .master-modal.modal-right .modal-ornament { display: none; }

        @media (max-width: 600px) {
            .master-modal.modal-right { width: 100%; max-width: 100%; }
        }
        .master-modal-backdrop.open .master-modal { transform: none; opacity: 1; }

        .modal-close-btn {
            position: absolute; top: 16px; right: 16px; z-index: 50;
            width: 28px; height: 28px; border-radius: 50%;
            background: rgba(200,30,30,0.12); border: 1.5px solid rgba(200,30,30,0.35);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s;
        }
        .modal-close-btn:hover { background: rgba(200,30,30,0.25); border-color: #cc2222; }
        .modal-close-btn svg { width: 10px; height: 10px; fill: none; stroke: #cc2222; stroke-width: 2; stroke-linecap: round; }

        .modal-scrollable {
            overflow-y: auto; flex: 1;
            margin: 24px 18px 18px;
            background: var(--modal-bg); border-radius: 12px;
            color: var(--modal-fg);
            scrollbar-width: thin; scrollbar-color: var(--accent) transparent;
            -webkit-overflow-scrolling: touch; scroll-behavior: smooth;
            overscroll-behavior: contain; position: relative; z-index: 30;
        }
        .modal-scrollable::-webkit-scrollbar { width: 4px; }
        .modal-scrollable::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 4px; }
        .modal-scrollable::-webkit-scrollbar-track { background: transparent; }

        .modal-scrollable .stats-title, .modal-scrollable .projects-title,
        .modal-scrollable .contact-modal-title, .modal-scrollable .about-name,
        .modal-scrollable .proj-card-title, .modal-scrollable .stat-value,
        .modal-scrollable .skill-info span:first-child, .modal-scrollable .contact-card-handle,
        .modal-scrollable .simple-modal-title { color: var(--modal-fg); }

        .modal-scrollable .stats-sub, .modal-scrollable .projects-sub,
        .modal-scrollable .about-role, .modal-scrollable .proj-card-desc,
        .modal-scrollable .contact-modal-sub, .modal-scrollable .simple-modal-sub,
        .modal-scrollable .stat-label, .modal-scrollable .about-body-text { color: var(--modal-muted); }

        .modal-scrollable .stat-card, .modal-scrollable .about-panel,
        .modal-scrollable .stats-skills, .modal-scrollable .stats-tech,
        .modal-scrollable .proj-card, .modal-scrollable .contact-card-item,
        .modal-scrollable .skill-bar, .modal-scrollable .stat-bar {
            background: var(--modal-surface); border-color: var(--modal-border);
        }
        .modal-scrollable .tech-tag {
            background: var(--modal-surface); border-color: var(--modal-border); color: var(--modal-accent);
        }
        .modal-scrollable .proj-filter-pill {
            color: var(--modal-fg); border-color: var(--modal-border);
        }
        .modal-scrollable .proj-filter-pill:hover { color: var(--accent); border-color: var(--modal-border-hi); }
        .modal-scrollable .proj-filter-pill.active {
            background: rgba(200, 30, 30, 0.15); border-color: rgba(200, 30, 30, 0.4);
            color: #aa1111; box-shadow: none;
        }
        .master-modal.modal-right .modal-scrollable .proj-filter-pill { color: var(--modal-muted); border-color: var(--modal-border); }
        .master-modal.modal-right .modal-scrollable .proj-filter-pill:hover { color: var(--accent); border-color: var(--modal-border-hi); }
        .master-modal.modal-right .modal-scrollable .proj-filter-pill.active {
            background: rgba(255, 77, 77, 0.2); color: var(--modal-fg);
            box-shadow: 0 0 10px rgba(255, 77, 77, 0.28);
        }

        /* ── ABOUT MODAL ── */
        .about-modal-inner { padding: 24px 20px 28px; display: flex; flex-direction: column; gap: 16px; }
        .about-header { display: flex; align-items: center; gap: 14px; padding-bottom: 16px; border-bottom: 1px solid var(--modal-border); }
        .about-avatar {
            width: 60px; height: 60px; border-radius: 50%; flex-shrink: 0;
            background: linear-gradient(135deg, var(--accent), var(--accent-glow));
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; font-weight: 700; color: white;
            box-shadow: 0 0 0 3px var(--accent-glow), 0 0 15px var(--accent-glow);
        }
        .about-avatar img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .about-header-text { flex: 1; }
        .about-pre { font-family: 'Zen Kaku Gothic New', sans-serif; font-size: 0.48rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--accent); margin-bottom: 3px; }
        .about-name { font-size: 1.2rem; font-weight: 700; letter-spacing: -0.02em; color: var(--modal-fg); }
        .about-role { font-size: 0.68rem; color: var(--modal-muted); margin-top: 2px; }
        .about-status { display: inline-flex; align-items: center; gap: 6px; margin-top: 6px; }
        .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #34d399; box-shadow: 0 0 6px rgba(52,211,153,0.6); animation: status-pulse 2s ease-in-out infinite; }
        .status-text { font-size: 0.6rem; color: #6ee7b7; font-weight: 500; }
        .about-panel-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .about-panel { background: var(--modal-surface); border: 1px solid var(--modal-border); border-radius: 12px; padding: 14px; display: flex; flex-direction: column; gap: 8px; }
        .about-panel.full { grid-column: 1 / -1; }
        .panel-label { font-family: 'Zen Kaku Gothic New', sans-serif; font-size: 0.48rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); margin-bottom: 4px; }
        .tech-list { display: flex; flex-direction: column; gap: 5px; }
        .tech-item { display: flex; align-items: center; gap: 8px; font-size: 0.68rem; color: var(--modal-fg); font-weight: 500; }
        .tech-item:hover { border-color: var(--accent); background: rgba(255,77,77,0.08); transform: translateX(3px); }
        .tech-ico { width: 18px; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; flex-shrink: 0; }
        .tech-badge { margin-left: auto; font-size: 0.5rem; padding: 2px 6px; background: rgba(255,77,77,0.1); border: 1px solid rgba(255,77,77,0.25); border-radius: 100px; color: var(--accent); font-weight: 600; }
        .about-body-text { font-size: 0.74rem; line-height: 1.7; color: var(--modal-muted); border-left: 2px solid var(--accent); padding-left: 10px; }
        .about-body-text strong { color: var(--accent); font-weight: 600; }
        .about-links { display: flex; flex-wrap: wrap; gap: 6px; }
        .about-link-chip {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 6px 12px; font-size: 0.62rem; font-weight: 600;
            color: var(--modal-muted); text-decoration: none;
            background: var(--modal-surface); border: 1px solid var(--modal-border);
            border-radius: 100px; transition: all 0.2s;
        }
        .about-link-chip:hover { border-color: var(--accent); color: var(--modal-fg); background: rgba(255,77,77,0.1); transform: translateY(-2px); }
        .about-link-chip svg { width: 12px; height: 12px; fill: currentColor; flex-shrink: 0; }

        /* ── STATS MODAL ── */
        .stats-modal-inner { padding: 24px 20px 32px; display: flex; flex-direction: column; gap: 16px; }
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .stat-card { background: var(--modal-surface); border: 1px solid var(--modal-border); border-radius: 14px; padding: 14px 12px; display: flex; flex-direction: column; gap: 6px; }
        .stat-icon { font-size: 1rem; color: var(--accent); }
        .stat-value { font-size: 1.4rem; font-weight: 800; color: var(--modal-fg); }
        .stat-label { font-size: 0.58rem; color: var(--modal-muted); text-transform: uppercase; letter-spacing: 0.1em; }
        .stat-bar { height: 3px; background: rgba(255,255,255,0.1); border-radius: 2px; margin-top: 4px; overflow: hidden; }
        .stat-fill { height: 100%; background: var(--accent); box-shadow: 0 0 8px var(--accent-glow); border-radius: 2px; }
        .stats-skills { padding: 16px; background: var(--modal-surface); border: 1px solid var(--modal-border); border-radius: 14px; }
        .skill-bars { display: flex; flex-direction: column; gap: 10px; margin-top: 12px; }
        .skill-item { display: flex; flex-direction: column; gap: 4px; }
        .skill-info { display: flex; justify-content: space-between; font-size: 0.7rem; }
        .skill-info span:first-child { color: var(--modal-fg); font-weight: 500; }
        .skill-pct { color: var(--accent); font-weight: 600; }
        .skill-bar { height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; }
        .skill-fill { height: 100%; background: var(--accent); box-shadow: 0 0 8px var(--accent-glow); border-radius: 2px; }
        .stats-tech { padding: 16px; background: var(--modal-surface); border: 1px solid var(--modal-border); border-radius: 14px; }
        .tech-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
        .tech-tag { padding: 4px 10px; background: var(--modal-surface); border: 1px solid var(--modal-border); border-radius: 100px; font-size: 0.6rem; color: var(--modal-accent); font-weight: 500; }

        /* ── PROJECTS MODAL ── */
        .projects-modal-inner { padding: 24px 20px 32px; display: flex; flex-direction: column; gap: 16px; }
        .projects-header { padding-bottom: 16px; border-bottom: 1px solid var(--modal-border); }
        .projects-title { font-size: 1.2rem; font-weight: 800; letter-spacing: -0.03em; color: var(--modal-fg); }
        .projects-sub { font-size: 0.72rem; color: var(--modal-muted); margin-top: 4px; }
        .projects-filter { display: flex; gap: 6px; flex-wrap: wrap; }
        .proj-filter-pill {
            padding: 6px 14px; border-radius: 20px;
            font-size: 0.75rem; font-weight: 500;
            background: var(--modal-surface); border: 1px solid var(--modal-border);
            color: var(--modal-muted); cursor: pointer; transition: all 0.2s;
        }
        .proj-filter-pill:hover { border-color: var(--modal-border-hi); color: var(--accent); }
        .proj-filter-pill.active { background: rgba(255,77,77,0.2); border-color: var(--modal-border-hi); color: var(--modal-fg); box-shadow: 0 0 10px var(--modal-glow); }
        body.light-mode .proj-filter-pill.active { background: rgba(232,60,122,0.2); }

        .proj-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; }
        .proj-card {
            background: var(--modal-surface); border: 1px solid var(--modal-border);
            border-radius: 12px; overflow: hidden; cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s, border-color 0.2s;
            position: relative; will-change: transform;
        }
        .proj-card:hover { transform: translateY(-3px); border-color: var(--accent); box-shadow: 0 12px 30px rgba(0,0,0,0.4), 0 0 12px var(--accent-glow); }
        .proj-card-thumb { height: 100px; overflow: hidden; position: relative; background: rgba(255,255,255,0.03); }
        .proj-card-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.3s ease; filter: saturate(0.85) brightness(0.9); }
        .proj-card:hover .proj-card-thumb img { transform: scale(1.04); filter: saturate(1) brightness(1); }
        .proj-card-overlay { position: absolute; inset: 0; background: linear-gradient(0deg, rgba(8,7,15,0.75) 0%, transparent 55%); }
        .proj-card-badge {
            position: absolute; top: 8px; left: 8px; z-index: 2;
            padding: 3px 8px; border-radius: 100px;
            font-family: 'Zen Kaku Gothic New', sans-serif; font-size: 0.48rem; letter-spacing: 0.1em; text-transform: uppercase;
        }
        .badge-web  { background: rgba(56,189,248,.14); border: 1px solid rgba(56,189,248,.4); color: #38bdf8; }
        .badge-java { background: rgba(251,146,60,.14); border: 1px solid rgba(251,146,60,.4); color: #fb923c; }
        .badge-game { background: rgba(167,139,250,.14); border: 1px solid rgba(167,139,250,.4); color: #a78bfa; }
        .proj-card-body { padding: 10px 12px 12px; }
        .proj-card-title { font-size: 0.8rem; font-weight: 700; color: var(--modal-fg); margin-bottom: 4px; }
        .proj-card-desc { font-size: 0.67rem; color: var(--modal-muted); line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .proj-card-link {
            display: inline-flex; align-items: center; gap: 5px; margin-top: 8px;
            padding: 4px 10px; font-size: 0.58rem; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase;
            color: var(--modal-accent2); text-decoration: none;
            background: rgba(255,77,77,0.1); border: 1px solid rgba(255,77,77,0.28); border-radius: 7px;
            transition: all 0.22s; position: relative; z-index: 2;
        }
        .proj-card-link:hover { background: rgba(255,77,77,0.22); border-color: var(--modal-accent); color: var(--modal-fg); }
        .proj-card-link svg { width: 9px; height: 9px; fill: none; stroke: currentColor; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

        /* ── PROJECT DETAIL PANEL ── */
        .project-detail-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 9999;
            opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        .project-detail-overlay.open { opacity: 1; pointer-events: auto; }
        .project-detail {
            position: fixed; top: 0; right: -500px;
            width: 480px; max-width: 100%; height: 100vh;
            background: var(--modal-bg); z-index: 10000;
            transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            overflow-y: auto; box-shadow: -20px 0 60px rgba(0,0,0,0.5);
        }
        body:not(.light-mode) .project-detail { border-left: 3px solid #e63946; }
        body.light-mode .project-detail { border-left: 4px solid #000; }
        .project-detail.open { right: 0; }
        .project-detail-close {
            position: absolute; top: 16px; right: 16px;
            width: 32px; height: 32px; border-radius: 50%;
            background: var(--modal-surface); border: 1px solid var(--modal-border);
            color: var(--modal-fg); cursor: pointer;
            display: flex; align-items: center; justify-content: center; transition: all 0.2s;
        }
        .project-detail-close:hover { background: var(--accent); border-color: var(--accent); color: white; }
        .project-detail-thumb { width: 100%; height: 220px; object-fit: cover; }
        .project-detail-header { padding: 20px; border-bottom: 1px solid var(--modal-border); }
        .project-detail-badge { display: inline-block; padding: 4px 12px; border-radius: 100px; font-size: 0.65rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px; }
        .project-detail-title { font-size: 1.5rem; font-weight: 700; color: var(--modal-fg); margin-bottom: 8px; }
        .project-detail-content { padding: 20px; }
        .project-detail-desc { font-size: 0.88rem; color: var(--modal-muted); line-height: 1.8; margin-bottom: 20px; }
        .project-detail-meta { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
        .project-detail-tag { padding: 4px 12px; border-radius: 100px; font-size: 0.62rem; font-weight: 600; background: var(--modal-surface); border: 1px solid var(--modal-border); color: var(--modal-accent2); }
        .project-detail-link {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 12px 24px; background: var(--accent); color: white;
            text-decoration: none; border-radius: 8px;
            font-weight: 600; font-size: 0.85rem; transition: all 0.2s;
        }
        .project-detail-link:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(255,77,77,0.3); }

        @media (max-width: 600px) { .project-detail { width: 100%; right: -100%; } }

        /* ── CONTACT MODAL ── */
        .contact-modal-inner { padding: 32px 28px 36px; display: flex; flex-direction: column; gap: 20px; }
        .contact-modal-header { padding-bottom: 20px; border-bottom: 1px solid var(--modal-border); text-align: center; }
        .contact-modal-pre { font-family: 'Zen Kaku Gothic New', sans-serif; font-size: 0.52rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--modal-accent2); margin-bottom: 8px; }
        .contact-modal-title { font-size: 1.3rem; font-weight: 800; letter-spacing: -0.03em; color: var(--modal-fg); }
        .contact-modal-sub { font-size: 0.78rem; color: var(--modal-muted); margin-top: 6px; line-height: 1.6; }
        .contact-modal-hl { width: 40px; height: 2px; background: linear-gradient(90deg, var(--modal-accent), transparent); border-radius: 2px; margin: 12px auto 0; }
        .contact-stack { display: flex; flex-direction: column; gap: 10px; }
        .contact-card-item {
            display: flex; align-items: center; gap: 14px; padding: 16px 18px;
            background: var(--modal-surface); border: 1px solid var(--modal-border);
            border-radius: 14px; text-decoration: none; position: relative; overflow: hidden;
            transition: transform 0.28s cubic-bezier(0.4,0,0.2,1), box-shadow 0.28s, border-color 0.28s;
        }
        .contact-card-item::before {
            content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
            background: linear-gradient(180deg, var(--modal-accent), var(--modal-accent2));
            opacity: 0; border-radius: 0 2px 2px 0; transition: opacity 0.3s;
        }
        .contact-card-item:hover { transform: translateX(5px); border-color: var(--modal-border-hi); box-shadow: 0 8px 30px rgba(0,0,0,0.4), 0 0 16px rgba(255,77,77,0.15); }
        .contact-card-item:hover::before { opacity: 1; }
        .contact-icon-wrap {
            width: 44px; height: 44px; border-radius: 12px; flex-shrink: 0;
            background: rgba(255,77,77,0.1); border: 1px solid rgba(255,77,77,0.2);
            display: flex; align-items: center; justify-content: center; transition: all 0.25s;
        }
        .contact-card-item:hover .contact-icon-wrap { background: rgba(255,77,77,0.18); border-color: rgba(255,77,77,0.4); }
        .contact-icon-wrap svg { width: 18px; height: 18px; }
        .contact-card-info { flex: 1; }
        .contact-card-platform { font-family: 'Zen Kaku Gothic New', sans-serif; font-size: 0.55rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--modal-accent2); margin-bottom: 3px; }
        .contact-card-handle { font-size: 0.8rem; font-weight: 600; color: var(--modal-fg); }
        .contact-arrow-btn {
            width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
            background: var(--modal-surface); border: 1px solid var(--modal-border);
            display: flex; align-items: center; justify-content: center; transition: all 0.25s;
        }
        .contact-card-item:hover .contact-arrow-btn { background: rgba(255,77,77,0.18); border-color: var(--modal-border-hi); transform: translateX(2px); }
        .contact-arrow-btn svg { width: 11px; height: 11px; fill: none; stroke: var(--modal-accent2); stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

        /* ── RESPONSIVE ── */
        @media (max-width: 768px) {
            .dashboard-container { grid-template-columns: 1fr 1fr; }
            .widget-hero { grid-column: 1/3; height: 180px; }
            .widget-scene { grid-column: 1/3; grid-row: auto; min-height: 200px; }
            .widget-apps { grid-column: 1/3; }
            .widget-image { grid-column: 1/3; }
            .widget-status { grid-column: 1/3; }
            .widget-quote-stack { grid-column: 1/3; }
            .widget-profile { grid-column: 1/3; }
            .footer-nav { grid-column: 1/3; }
            .about-panel-grid { grid-template-columns: 1fr; }
            .proj-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
        }
        @media (max-width: 600px) {
            .master-modal { border-radius: 20px 20px 0 0; max-height: 88vh; }
            .master-modal-backdrop { align-items: flex-end; padding: 0; }
        }
        @media (max-width: 480px) {
            body { padding: 8px; }
            .dashboard-container { grid-template-columns: 1fr; gap: 6px; }
            .widget-hero { grid-column: 1; height: 150px; }
            .widget-scene { grid-column: 1; grid-row: auto; min-height: 200px; }
            .widget-apps { grid-column: 1; }
            .widget-status { grid-column: 1; }
            .widget-quote-stack { grid-column: 1; }
            .widget-profile { grid-column: 1; }
            .footer-nav { grid-column: 1; flex-wrap: wrap; gap: 8px; }
            .clock-overlay { font-size: 3rem; letter-spacing: 4px; }
            .quote-box { height: 100px; }
            .proj-grid { grid-template-columns: 1fr 1fr; }
        }
        @media (min-width: 1100px) { .dashboard-container { max-width: 960px; } }
    </style>
</head>
<body>

    <!-- Theme transition overlay -->
    <div id="theme-overlay"></div>

    <!-- Curtain intro -->
    <div class="initial-load-overlay" id="start-overlay">
        <div class="curtain-left"></div>
        <div class="curtain-right"></div>
    </div>

    <!-- MASTER MODAL -->
    <div class="master-modal-backdrop" id="master-modal" onclick="handleModalBackdrop(event)">
        <div class="master-modal" id="master-modal-card">

            <!-- ORNAMENTAL SVG FRAME -->
            <svg class="modal-ornament" width="100%" height="100%" style="position:absolute; inset:0; pointer-events:none; z-index:40; overflow:visible;">
                <defs>
                    <filter id="glow-heavy" x="-20%" y="-20%" width="140%" height="140%">
                        <feGaussianBlur stdDeviation="3" result="blur"/>
                        <feComposite in="SourceGraphic" in2="blur" operator="over"/>
                    </filter>
                    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#ffd700"/>
                        <stop offset="100%" stop-color="#ff8c00"/>
                    </linearGradient>
                    <linearGradient id="pink-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#ffb6c1"/>
                        <stop offset="100%" stop-color="#ff69b4"/>
                    </linearGradient>
                </defs>
                <rect x="0" y="0" width="100%" height="100%" rx="20" fill="none" stroke="var(--modal-accent)" stroke-width="3" filter="url(#glow-heavy)"/>
                <rect x="6" y="6" width="calc(100% - 12px)" height="calc(100% - 12px)" rx="14" fill="none" stroke="var(--modal-accent2)" stroke-width="1.5" stroke-dasharray="8 6" opacity="0.6"/>
                <!-- Left deco -->
                <svg x="0" y="20%" width="20" height="60%" style="overflow:visible;">
                    <path d="M -16,0 C 12,25 12,calc(100% - 25) -16,100% L 0,100% L 0,0 Z" fill="var(--modal-accent)" opacity="0.9"/>
                </svg>
                <!-- Top-left corner -->
                <svg x="0" y="0" style="overflow:visible;">
                    <g class="theme-dark-only" transform="translate(-16, -16)">
                        <path d="M 0,55 Q 0,0 55,0 L 80,0 C 35,12 12,35 0,80 Z" fill="var(--modal-accent)"/>
                        <path d="M 8,48 Q 8,8 48,8 L 56,8 C 28,15 15,28 8,56 Z" fill="#0c0a16"/>
                        <path d="M 18,18 Q 40,-8 60,18 Q 70,45 40,65 Q 10,45 18,18 Z" fill="var(--modal-bg)" stroke="var(--modal-accent)" stroke-width="2.5" filter="url(#glow-heavy)"/>
                        <polygon points="18,18 12,-5 30,5" fill="var(--modal-accent)"/>
                        <polygon points="60,18 66,-5 48,5" fill="var(--modal-accent)"/>
                        <path d="M 26,28 Q 32,23 38,28" stroke="var(--modal-accent2)" stroke-width="2.5" fill="none"/>
                        <path d="M 52,28 Q 46,23 40,28" stroke="var(--modal-accent2)" stroke-width="2.5" fill="none"/>
                        <polygon points="39,12 43,20 39,28 35,20" fill="url(#gold-grad)"/>
                    </g>
                    <g class="theme-light-only" transform="translate(-16, -16)">
                        <path d="M 0,55 Q 0,0 55,0 L 80,0 C 35,12 12,35 0,80 Z" fill="var(--modal-accent)"/>
                        <path d="M 8,48 Q 8,8 48,8 L 56,8 C 28,15 15,28 8,56 Z" fill="#1a0510"/>
                        <circle cx="40" cy="30" r="20" fill="var(--modal-bg)" stroke="var(--modal-accent2)" stroke-width="2.5" filter="url(#glow-heavy)"/>
                        <path d="M 40,18 C 50,8 56,18 40,30 C 24,18 30,8 40,18 Z" fill="url(#pink-grad)"/>
                        <path d="M 40,42 C 50,52 56,42 40,30 C 24,42 30,52 40,42 Z" fill="url(#pink-grad)"/>
                        <circle cx="40" cy="30" r="4.5" fill="#ffd700"/>
                    </g>
                </svg>
                <!-- Top-right corner -->
                <svg x="100%" y="0" style="overflow:visible;">
                    <g transform="scale(-1, 1) translate(-10, -10)">
                        <path d="M 0,45 Q 0,0 45,0 L 65,0 C 30,12 12,30 0,65 Z" fill="var(--modal-accent)"/>
                        <path d="M 6,38 Q 6,6 38,6 L 45,6 C 22,12 12,22 6,45 Z" fill="var(--modal-bg)"/>
                        <polygon points="25,-8 28,12 48,15 28,18 25,38 22,18 2,15 22,12" fill="var(--star-fill)" filter="url(#glow-heavy)"/>
                    </g>
                </svg>

    <script>
    const masterModal  = document.getElementById('master-modal');
    const contentArea  = document.getElementById('modal-content-area');
    const themeOverlay = document.getElementById('theme-overlay');

    // ── Curtain intro ──
    window.addEventListener('load', () => {
        const startOverlay = document.getElementById('start-overlay');
        setTimeout(() => {
            startOverlay.style.opacity = '0';
            setTimeout(() => { startOverlay.style.display = 'none'; }, 800);
        }, 1200);
    });

    // ── Smooth theme toggle ──
    function toggleTheme() {
        // Fade in overlay
        themeOverlay.style.transition = 'opacity 0.45s cubic-bezier(0.4, 0, 0.2, 1)';
        themeOverlay.style.opacity = '1';

        setTimeout(() => {
            document.body.classList.toggle('light-mode');
            // Update overlay background to match new theme (it reads CSS var)
        }, 280);

        setTimeout(() => {
            themeOverlay.style.transition = 'opacity 0.55s cubic-bezier(0.4, 0, 0.2, 1)';
            themeOverlay.style.opacity = '0';
        }, 480);
    }

    // ── Modal helpers ──
    function openModal(templateId) {
        masterModal.classList.remove('modal-right');
        const template = document.getElementById(templateId);
        contentArea.innerHTML = '';
        if (template) contentArea.appendChild(template.content.cloneNode(true));
        masterModal.classList.add('open');
        document.body.style.overflow = 'hidden';
    }

    function openProjectsModal() {
        openModal('tpl-projects');
        setTimeout(() => masterModal.classList.add('modal-right'), 10);
    }

    function openStatsModal() {
        openModal('tpl-stats');
        setTimeout(() => masterModal.classList.add('modal-right'), 10);
    }

    function closeModal() {
        masterModal.classList.remove('open', 'modal-right');
        document.body.style.overflow = '';
    }

    function handleModalBackdrop(e) {
        if (e.target === masterModal) closeModal();
    }

    function openAboutModal()   { openModal('tpl-about'); }
    function openContactModal() { openModal('tpl-contact'); }

    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    // ── Filter projects ──
    function filterProjects(cat, btn) {
        document.querySelectorAll('.proj-filter-pill').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.proj-card').forEach(card => {
            card.style.display = (cat === 'all' || card.dataset.cat === cat) ? 'block' : 'none';
        });
    }

    // ── Project detail panel (reads from data-* attributes) ──
    function openProjectDetail(card) {
        const title = card.dataset.title || card.querySelector('.proj-card-title').textContent;
        const desc  = card.dataset.desc  || card.querySelector('.proj-card-desc').textContent;
        const tags  = (card.dataset.tags || '').split(',').filter(Boolean);
        const link  = card.dataset.link  || '';
        const badge = card.querySelector('.proj-card-badge')?.textContent || '';
        const img   = card.querySelector('.proj-card-thumb img');

        const panel   = document.getElementById('project-detail-panel');
        const overlay = document.getElementById('project-detail-overlay');

        panel.querySelector('.project-detail-thumb').src = img ? img.src : '';
        panel.querySelector('.project-detail-badge').textContent = badge;

        const badgeEl = panel.querySelector('.project-detail-badge');
        badgeEl.className = 'project-detail-badge ' + (card.querySelector('.proj-card-badge')?.className.replace('proj-card-badge','').trim() || '');

        panel.querySelector('.project-detail-title').textContent = title;
        panel.querySelector('.project-detail-desc').textContent  = desc;

        const metaEl = panel.querySelector('.project-detail-meta');
        metaEl.innerHTML = tags.map(t => `<span class="project-detail-tag">${t.trim()}</span>`).join('');

        const linkEl = panel.querySelector('.project-detail-link');
        if (link) { linkEl.href = link; linkEl.style.display = 'inline-flex'; }
        else { linkEl.style.display = 'none'; }

        overlay.classList.add('open');
        panel.classList.add('open');
    }

    function closeProjectDetail() {
        document.getElementById('project-detail-panel').classList.remove('open');
        document.getElementById('project-detail-overlay').classList.remove('open');
    }

    // ── Clock (Manila time) ──
    function updateClock() {
        const now  = new Date();
        const ph   = new Date(now.toLocaleString('en-US', { timeZone: 'Asia/Manila' }));
        let h      = ph.getHours();
        const m    = String(ph.getMinutes()).padStart(2,'0');
        const ampm = h >= 12 ? 'PM' : 'AM';
        h = h % 12 || 12;
        const el = document.getElementById('clock');
        if (el) el.textContent = h + ':' + m + ' ' + ampm;
    }
    setInterval(updateClock, 1000);
    updateClock();
    </script>
